<!DOCTYPE html>
<html>
<head>

<title>
Welcome Page
</title>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

font-family:
Arial,sans-serif;

}



/* BODY */

body{

background:

linear-gradient(

rgba(
0,
0,
0,
0.4),

rgba(
0,
0,
0,
0.4)

),

url("court.jpg");


background-size:
cover;

background-position:
center;

background-attachment:
fixed;


display:
flex;

justify-content:
center;

align-items:
center;

height:
100vh;

}



/* GLASS CARD */

.card{


background:

rgba(
255,
255,
255,
0.12);


backdrop-filter:
blur(
15px);


border:

1px solid rgba(
255,
255,
255,
0.2);


padding:
50px;


text-align:
center;


border-radius:
20px;


box-shadow:

0 8px 30px rgba(
0,
0,
0,
0.4);


width:
450px;


color:
white;


transition:
0.3s;

}



.card:hover{

transform:

translateY(
-5px);

}



/* TITLE */

h1{

margin-bottom:
20px;

font-size:
32px;

color:
white;

}



/* TEXT */

p{

font-size:
18px;

margin-bottom:
25px;

color:
#eee;

}



/* BUTTON */

a{


display:
inline-block;


padding:
15px 35px;


background:

rgba(
52,
152,
219,
0.85);


color:
white;


text-decoration:
none;


font-size:
18px;


font-weight:
bold;


border-radius:
10px;


transition:
0.3s;

}



a:hover{


background:
#2980b9;


transform:
scale(
1.05);

}


</style>

</head>



<body>



<div class="card">


<h1>

⚖ Welcome to Court Case Management System

</h1>



<p>

Manage cases, reports, hearings and legal records efficiently.

</p>



<a href="register.jsp">

Enter System

</a>



</div>



</body>
</html>
